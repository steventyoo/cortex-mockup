function GraphView(props) {
  const svgRef = useRef(null);

  useEffect(function() {
    if (!svgRef.current) return;
    const svg = d3.select(svgRef.current);
    svg.selectAll("*").remove();

    const width = svgRef.current.clientWidth;
    const height = svgRef.current.clientHeight;
    const g = svg.append("g");

    const zoom = d3.zoom().scaleExtent([0.2, 5]).on("zoom", function(ev) { g.attr("transform", ev.transform); });
    svg.call(zoom);
    svg.call(zoom.transform, d3.zoomIdentity.translate(width / 2, height / 2).scale(0.75));

    // Glow filter
    const defs = svg.append("defs");
    const filter = defs.append("filter").attr("id", "glow");
    filter.append("feGaussianBlur").attr("stdDeviation", "4").attr("result", "coloredBlur");
    const merge = filter.append("feMerge");
    merge.append("feMergeNode").attr("in", "coloredBlur");
    merge.append("feMergeNode").attr("in", "SourceGraphic");

    const nodes = graphData.nodes.map(function(d) { return Object.assign({}, d); });
    const links = graphData.links.map(function(d) { return Object.assign({}, d); });

    const sim = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(function(d) { return d.id; }).distance(110).strength(function(d) { return d.strength * 0.3; }))
      .force("charge", d3.forceManyBody().strength(-350))
      .force("center", d3.forceCenter(0, 0))
      .force("collision", d3.forceCollide().radius(function(d) { return d.size + 12; }));

    // Links
    const link = g.append("g").selectAll("line").data(links).join("line")
      .attr("stroke", "rgba(91,155,213,0.15)")
      .attr("stroke-width", function(d) { return d.strength * 2.5; });

    // Nodes
    const node = g.append("g").selectAll("g").data(nodes).join("g")
      .style("cursor", "pointer")
      .call(d3.drag()
        .on("start", function(ev, d) { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag", function(ev, d) { d.fx = ev.x; d.fy = ev.y; })
        .on("end", function(ev, d) { if (!ev.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
      );

    node.append("circle")
      .attr("r", function(d) { return d.size; })
      .attr("fill", function(d) { return nodeColors[d.type]; })
      .attr("fill-opacity", 0.8)
      .attr("stroke", function(d) { return nodeColors[d.type]; })
      .attr("stroke-width", 2)
      .attr("stroke-opacity", 0.4)
      .style("filter", "url(#glow)");

    // Labels
    node.each(function(d) {
      var lines = d.label.split("\n");
      var el = d3.select(this);
      lines.forEach(function(line, i) {
        el.append("text")
          .attr("text-anchor", "middle")
          .attr("dy", i === 0 ? (lines.length > 1 ? -5 : 4) : 10)
          .attr("fill", "#fff")
          .attr("font-size", d.size > 14 ? "9px" : "7px")
          .attr("font-family", "Inter, system-ui, sans-serif")
          .attr("font-weight", i === 0 ? "600" : "400")
          .attr("pointer-events", "none")
          .text(line);
      });
    });

    // Hover
    node.on("mouseover", function(ev, d) {
      d3.select(this).select("circle").transition().duration(200).attr("r", d.size * 1.3).attr("fill-opacity", 1);
      link.transition().duration(200)
        .attr("stroke", function(l) { return (l.source.id === d.id || l.target.id === d.id) ? nodeColors[d.type] : "rgba(91,155,213,0.04)"; })
        .attr("stroke-width", function(l) { return (l.source.id === d.id || l.target.id === d.id) ? 3 : 0.3; })
        .attr("stroke-opacity", function(l) { return (l.source.id === d.id || l.target.id === d.id) ? 0.9 : 0.2; });
      node.filter(function(n) { return n.id !== d.id && !links.some(function(l) { return (l.source.id === d.id && l.target.id === n.id) || (l.target.id === d.id && l.source.id === n.id); }); })
        .transition().duration(200).attr("opacity", 0.2);
    }).on("mouseout", function(ev, d) {
      d3.select(this).select("circle").transition().duration(200).attr("r", d.size).attr("fill-opacity", 0.8);
      link.transition().duration(200).attr("stroke", "rgba(91,155,213,0.15)").attr("stroke-width", function(l) { return l.strength * 2.5; }).attr("stroke-opacity", 1);
      node.transition().duration(200).attr("opacity", 1);
    }).on("click", function(ev, d) {
      props.onNodeClick(d);
    });

    sim.on("tick", function() {
      link.attr("x1", function(d) { return d.source.x; }).attr("y1", function(d) { return d.source.y; }).attr("x2", function(d) { return d.target.x; }).attr("y2", function(d) { return d.target.y; });
      node.attr("transform", function(d) { return "translate(" + d.x + "," + d.y + ")"; });
    });

    return function() { sim.stop(); };
  }, []);

  return e("div", { style: { width: "100%", height: "100%", position: "relative" } },
    e("svg", { ref: svgRef, style: { width: "100%", height: "100%", background: C.bg } }),
    // Legend
    e("div", { style: { position: "absolute", bottom: 16, left: 16, background: "rgba(25,25,25,0.92)", border: "1px solid " + C.border, borderRadius: 10, padding: "12px 18px", display: "flex", gap: 16, flexWrap: "wrap", backdropFilter: "blur(12px)" } },
      Object.entries(nodeColors).map(function(entry) {
        return e("div", { key: entry[0], style: { display: "flex", alignItems: "center", gap: 6 } },
          e("div", { style: { width: 10, height: 10, borderRadius: "50%", background: entry[1] } }),
          e("span", { style: { color: C.textMuted, fontSize: 11, textTransform: "capitalize" } }, entry[0] === "costCode" ? "Cost Code" : entry[0] === "gc" ? "GC" : entry[0])
        );
      })
    ),
    // Instructions
    e("div", { style: { position: "absolute", top: 16, left: 16, background: "rgba(30,30,30,0.88)", border: "1px solid " + C.border, borderRadius: 8, padding: "10px 14px", fontSize: 11, color: C.textMuted, backdropFilter: "blur(10px)" } },
      "Drag nodes \u00b7 Scroll to zoom \u00b7 Click for details"
    )
  );
}

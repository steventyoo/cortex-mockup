// ── GRAPH VIEW ──
function GraphView(props) {
  var svgRef = useRef(null);
  var simRef = useRef(null);

  useEffect(function() {
    if (!svgRef.current) return;
    var svg = d3.select(svgRef.current);
    svg.selectAll("*").remove();

    var w = svgRef.current.clientWidth;
    var ht = svgRef.current.clientHeight;
    var g = svg.append("g");

    // Zoom
    var zoom = d3.zoom().scaleExtent([0.15, 6]).on("zoom", function(ev) { g.attr("transform", ev.transform); });
    svg.call(zoom);
    svg.call(zoom.transform, d3.zoomIdentity.translate(w / 2, ht / 2).scale(0.7));

    // SVG Defs — glows, gradients
    var defs = svg.append("defs");

    // Soft outer glow
    var glowFilter = defs.append("filter").attr("id", "nodeGlow").attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
    glowFilter.append("feGaussianBlur").attr("in", "SourceGraphic").attr("stdDeviation", "6").attr("result", "blur");
    glowFilter.append("feColorMatrix").attr("in", "blur").attr("type", "saturate").attr("values", "2").attr("result", "saturated");
    var glowMerge = glowFilter.append("feMerge");
    glowMerge.append("feMergeNode").attr("in", "saturated");
    glowMerge.append("feMergeNode").attr("in", "SourceGraphic");

    // Subtle ambient glow for links
    var linkGlow = defs.append("filter").attr("id", "linkGlow");
    linkGlow.append("feGaussianBlur").attr("stdDeviation", "2").attr("result", "blur");
    var linkMerge = linkGlow.append("feMerge");
    linkMerge.append("feMergeNode").attr("in", "blur");
    linkMerge.append("feMergeNode").attr("in", "SourceGraphic");

    // Background grid pattern
    var grid = defs.append("pattern").attr("id", "grid").attr("width", 40).attr("height", 40).attr("patternUnits", "userSpaceOnUse");
    grid.append("circle").attr("cx", 20).attr("cy", 20).attr("r", 0.5).attr("fill", "rgba(255,255,255,0.03)");

    // Background
    g.append("rect").attr("x", -5000).attr("y", -5000).attr("width", 10000).attr("height", 10000).attr("fill", "url(#grid)");

    var nodes = graphData.nodes.map(function(d) { return Object.assign({}, d); });
    var links = graphData.links.map(function(d) { return Object.assign({}, d); });

    var sim = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(function(d) { return d.id; }).distance(120).strength(function(d) { return d.strength * 0.25; }))
      .force("charge", d3.forceManyBody().strength(-400))
      .force("center", d3.forceCenter(0, 0).strength(0.05))
      .force("collision", d3.forceCollide().radius(function(d) { return d.size + 14; }))
      .force("x", d3.forceX().strength(0.02))
      .force("y", d3.forceY().strength(0.02));
    simRef.current = sim;

    // Links
    var linkGroup = g.append("g");
    var link = linkGroup.selectAll("line").data(links).join("line")
      .attr("stroke", "rgba(124,77,255,0.08)")
      .attr("stroke-width", function(d) { return 0.5 + d.strength * 1.5; });

    // Animated particles along links
    var particleGroup = g.append("g");
    var particles = [];
    links.forEach(function(l, i) {
      if (l.strength > 0.6) {
        particles.push({ link: l, offset: Math.random(), speed: 0.002 + Math.random() * 0.003, idx: i });
      }
    });
    var particleDots = particleGroup.selectAll("circle").data(particles).join("circle")
      .attr("r", 1.5)
      .attr("fill", function(d) { return typeColors[graphData.nodes.find(function(n) { return n.id === (typeof d.link.source === "object" ? d.link.source.id : d.link.source); }).type].fill; })
      .attr("opacity", 0.6);

    // Node groups
    var nodeGroup = g.append("g");
    var node = nodeGroup.selectAll("g").data(nodes).join("g")
      .style("cursor", "pointer")
      .call(d3.drag()
        .on("start", function(ev, d) { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag", function(ev, d) { d.fx = ev.x; d.fy = ev.y; })
        .on("end", function(ev, d) { if (!ev.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
      );

    // Outer glow circle (larger, faint)
    node.append("circle")
      .attr("r", function(d) { return d.size * 1.8; })
      .attr("fill", function(d) { return typeColors[d.type].glow; })
      .attr("opacity", 0.12);

    // Mid glow
    node.append("circle")
      .attr("r", function(d) { return d.size * 1.2; })
      .attr("fill", function(d) { return typeColors[d.type].glow; })
      .attr("opacity", 0.2);

    // Core circle
    node.append("circle")
      .attr("class", "core")
      .attr("r", function(d) { return d.size; })
      .attr("fill", function(d) {
        return typeColors[d.type].fill;
      })
      .attr("fill-opacity", 0.85)
      .attr("stroke", function(d) { return typeColors[d.type].fill; })
      .attr("stroke-width", 1.5)
      .attr("stroke-opacity", 0.3)
      .style("filter", "url(#nodeGlow)");

    // Inner highlight (glass effect)
    node.append("circle")
      .attr("r", function(d) { return d.size * 0.6; })
      .attr("fill", "rgba(255,255,255,0.08)")
      .attr("cy", function(d) { return -d.size * 0.2; })
      .attr("pointer-events", "none");

    // Labels
    node.each(function(d) {
      var lines = d.label.split("\n");
      var el = d3.select(this);
      lines.forEach(function(line, i) {
        el.append("text")
          .attr("text-anchor", "middle")
          .attr("dy", i === 0 ? (lines.length > 1 ? -6 : 4) : 11)
          .attr("fill", "rgba(255,255,255,0.92)")
          .attr("font-size", d.size > 16 ? "9px" : d.size > 12 ? "8px" : "7px")
          .attr("font-family", "'Inter', system-ui, sans-serif")
          .attr("font-weight", i === 0 ? "600" : "400")
          .attr("pointer-events", "none")
          .attr("letter-spacing", "0.01em")
          .text(line);
      });
    });

    // Hover interactions
    node.on("mouseover", function(ev, d) {
      var thisColor = typeColors[d.type].fill;
      // Enlarge node
      d3.select(this).select(".core").transition().duration(250).ease(d3.easeCubicOut)
        .attr("r", d.size * 1.25).attr("fill-opacity", 1).attr("stroke-width", 2.5).attr("stroke-opacity", 0.6);
      // Highlight connected links
      var connectedIds = new Set();
      connectedIds.add(d.id);
      link.transition().duration(250)
        .attr("stroke", function(l) {
          var src = typeof l.source === "object" ? l.source.id : l.source;
          var tgt = typeof l.target === "object" ? l.target.id : l.target;
          if (src === d.id || tgt === d.id) {
            connectedIds.add(src); connectedIds.add(tgt);
            return thisColor;
          }
          return "rgba(124,77,255,0.03)";
        })
        .attr("stroke-width", function(l) {
          var src = typeof l.source === "object" ? l.source.id : l.source;
          var tgt = typeof l.target === "object" ? l.target.id : l.target;
          return (src === d.id || tgt === d.id) ? 2.5 : 0.3;
        })
        .attr("stroke-opacity", function(l) {
          var src = typeof l.source === "object" ? l.source.id : l.source;
          var tgt = typeof l.target === "object" ? l.target.id : l.target;
          return (src === d.id || tgt === d.id) ? 0.9 : 0.15;
        })
        .style("filter", function(l) {
          var src = typeof l.source === "object" ? l.source.id : l.source;
          var tgt = typeof l.target === "object" ? l.target.id : l.target;
          return (src === d.id || tgt === d.id) ? "url(#linkGlow)" : "none";
        });
      // Dim disconnected nodes
      node.transition().duration(250)
        .attr("opacity", function(n) { return connectedIds.has(n.id) ? 1 : 0.12; });
    }).on("mouseout", function() {
      node.selectAll(".core").transition().duration(300).ease(d3.easeCubicOut)
        .attr("r", function(d) { return d.size; }).attr("fill-opacity", 0.85).attr("stroke-width", 1.5).attr("stroke-opacity", 0.3);
      link.transition().duration(300)
        .attr("stroke", "rgba(124,77,255,0.08)")
        .attr("stroke-width", function(d) { return 0.5 + d.strength * 1.5; })
        .attr("stroke-opacity", 1)
        .style("filter", "none");
      node.transition().duration(300).attr("opacity", 1);
    }).on("click", function(ev, d) {
      props.onNodeClick(d);
    });

    // Tick
    sim.on("tick", function() {
      link.attr("x1", function(d) { return d.source.x; }).attr("y1", function(d) { return d.source.y; })
          .attr("x2", function(d) { return d.target.x; }).attr("y2", function(d) { return d.target.y; });
      node.attr("transform", function(d) { return "translate(" + d.x + "," + d.y + ")"; });
      // Animate particles
      particleDots.each(function(p) {
        p.offset = (p.offset + p.speed) % 1;
        var src = p.link.source;
        var tgt = p.link.target;
        var x = src.x + (tgt.x - src.x) * p.offset;
        var y = src.y + (tgt.y - src.y) * p.offset;
        d3.select(this).attr("cx", x).attr("cy", y);
      });
    });

    return function() { sim.stop(); };
  }, []);

  return h("div", { style: { width: "100%", height: "100%", position: "relative" } },
    h("svg", { ref: svgRef, style: { width: "100%", height: "100%", background: "radial-gradient(ellipse at center, #1e1e3a 0%, #141428 70%, #0f0f1e 100%)" } })
  );
}

  var searchState = useState("");
  var search = searchState[0], setSearch = searchState[1];

  return h("div", { style: { width: "100%", height: "100vh", background: P.bg, color: P.text, display: "flex", flexDirection: "column" } },
    // ── TOP NAV ──
    h("div", { style: { height: 48, borderBottom: "1px solid " + P.border, display: "flex", alignItems: "center", padding: "0 20px", gap: 12, flexShrink: 0, background: "rgba(22,22,42,0.6)", backdropFilter: "blur(12px)", zIndex: 20 } },
      // Sidebar toggle
      h("button", { onClick: function() { setShowSidebar(!showSidebar); }, style: { background: "none", border: "none", color: P.textMuted, cursor: "pointer", fontSize: 16, padding: "4px 6px", borderRadius: 4 } }, showSidebar ? "\u25c0" : "\u25b6"),
      // Logo
      h("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
        h("div", { style: { width: 22, height: 22, borderRadius: 6, background: "linear-gradient(135deg, " + P.purple + ", " + P.blue + ")", display: "flex", alignItems: "center", justifyContent: "center" } },
          h("span", { style: { fontSize: 11, fontWeight: 800, color: "#fff" } }, "C")
        ),
        h("span", { style: { fontSize: 14, fontWeight: 700, letterSpacing: "-0.01em" } }, "Cortex")
      ),
      h("div", { style: { width: 1, height: 22, background: P.border } }),
      // View tabs
      h("div", { style: { display: "flex", gap: 2, background: "rgba(255,255,255,0.03)", borderRadius: 8, padding: 2 } },
        [
          { id: "graph", label: "Graph" },
          { id: "report", label: "Report" },
        ].map(function(tab) {
          var active = view === tab.id;
          return h("button", {
            key: tab.id,
            onClick: function() { setView(tab.id); setSelectedNode(null); },
            style: {
              padding: "5px 16px", border: "none", borderRadius: 6, cursor: "pointer",
              background: active ? "rgba(124,77,255,0.15)" : "transparent",
              color: active ? P.purple : P.textMuted,
              fontSize: 12, fontWeight: active ? 600 : 400, fontFamily: "'Inter', sans-serif",
              transition: "all 0.15s ease", letterSpacing: "0.01em"
            }
          }, tab.label);
        })
      ),
      h("div", { style: { flex: 1 } }),
      // Breadcrumb
      h("div", { style: { display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: P.textMuted } },
        h("span", { style: { color: P.textDim } }, "OWP, LLC"),
        h("span", { style: { color: P.textDim } }, "/"),
        h("span", null, "Job #2012"),
        h("span", { style: { color: P.textDim } }, "/"),
        h("span", { style: { color: P.purple } }, view === "graph" ? "Knowledge Graph" : "Intelligence Report")
      )
    ),

    // ── CONTENT ──
    h("div", { style: { flex: 1, position: "relative", overflow: "hidden", display: "flex" } },
      // Sidebar (graph view only)
      view === "graph" && showSidebar ? h(Sidebar, { search: search, onSearch: setSearch }) : null,

      // Main area
      h("div", { style: { flex: 1, position: "relative", overflow: "hidden" } },
        view === "graph"
          ? h(React.Fragment, null,
              h(GraphView, { onNodeClick: setSelectedNode }),
              h(NodePanel, { node: selectedNode, onClose: function() { setSelectedNode(null); } })
            )
          : h("div", { style: { height: "100%", overflow: "auto", background: "radial-gradient(ellipse at top, #1e1e3a, #1a1a2e 60%)" } },
              h(ReportView, null)
            )
      )
    )
  );
}

ReactDOM.render(h(App, null), document.getElementById("root"));
</script>
</body>
</html>

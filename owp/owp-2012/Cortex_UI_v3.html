// ── GRAPH VIEW ──
function GraphView(props) {
  var svgRef = useRef(null);

  useEffect(function() {
    if (!svgRef.current) return;
    var svg = d3.select(svgRef.current);
    svg.selectAll("*").remove();

    var w = svgRef.current.clientWidth;
    var ht = svgRef.current.clientHeight;
    var g = svg.append("g");

    var zoom = d3.zoom().scaleExtent([0.15, 6]).on("zoom", function(ev) { g.attr("transform", ev.transform); });
    svg.call(zoom);
    svg.call(zoom.transform, d3.zoomIdentity.translate(w / 2, ht / 2).scale(0.85));

    var nodes = graphData.nodes.map(function(d) { return Object.assign({}, d); });
    var links = graphData.links.map(function(d) { return Object.assign({}, d); });

    var sim = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(function(d) { return d.id; }).distance(130).strength(function(d) { return d.strength * 0.2; }))
      .force("charge", d3.forceManyBody().strength(-350))
      .force("center", d3.forceCenter(0, 0).strength(0.04))
      .force("collision", d3.forceCollide().radius(function(d) { return d.size + 40; }))
      .force("x", d3.forceX().strength(0.015))
      .force("y", d3.forceY().strength(0.015));

    // Links — thin, light gray
    var link = g.append("g").selectAll("line").data(links).join("line")
      .attr("stroke", "#d8d8d8")
      .attr("stroke-width", function(d) { return 0.5 + d.strength * 0.8; });

    // Nodes
    var node = g.append("g").selectAll("g").data(nodes).join("g")
      .style("cursor", "pointer")
      .call(d3.drag()
        .on("start", function(ev, d) { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag", function(ev, d) { d.fx = ev.x; d.fy = ev.y; })
        .on("end", function(ev, d) { if (!ev.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
      );

    // Solid dark circles
    node.append("circle")
      .attr("class", "core")
      .attr("r", function(d) { return d.size; })
      .attr("fill", function(d) { return typeConfig[d.type].fill; })
      .attr("stroke", "none");

    // Labels — offset below node, single line, clean
    node.append("text")
      .attr("text-anchor", "middle")
      .attr("dy", function(d) { return d.size + 14; })
      .attr("fill", "#555")
      .attr("font-size", "11px")
      .attr("font-family", "'Inter', -apple-system, sans-serif")
      .attr("font-weight", "400")
      .attr("pointer-events", "none")
      .text(function(d) { return d.label.replace("\n", " "); });

    // Hover
    node.on("mouseover", function(ev, d) {
      var connectedIds = new Set();
      connectedIds.add(d.id);
      // Highlight node
      d3.select(this).select(".core").transition().duration(200)
        .attr("r", d.size * 1.4).attr("fill", "#1a1a1a");
      d3.select(this).select("text").transition().duration(200)
        .attr("fill", "#1a1a1a").attr("font-weight", "600");
      // Highlight links
      link.transition().duration(200)
        .attr("stroke", function(l) {
          var s = typeof l.source === "object" ? l.source.id : l.source;
          var t = typeof l.target === "object" ? l.target.id : l.target;
          if (s === d.id || t === d.id) { connectedIds.add(s); connectedIds.add(t); return "#888"; }
          return "#eee";
        })
        .attr("stroke-width", function(l) {
          var s = typeof l.source === "object" ? l.source.id : l.source;
          var t = typeof l.target === "object" ? l.target.id : l.target;
          return (s === d.id || t === d.id) ? 1.5 : 0.3;
        });
      // Dim disconnected
      node.transition().duration(200)
        .attr("opacity", function(n) { return connectedIds.has(n.id) ? 1 : 0.15; });
    }).on("mouseout", function() {
      node.selectAll(".core").transition().duration(300)
        .attr("r", function(d) { return d.size; }).attr("fill", function(d) { return typeConfig[d.type].fill; });
      node.selectAll("text").transition().duration(300)
        .attr("fill", "#555").attr("font-weight", "400");
      link.transition().duration(300)
        .attr("stroke", "#d8d8d8")
        .attr("stroke-width", function(d) { return 0.5 + d.strength * 0.8; });
      node.transition().duration(300).attr("opacity", 1);
    }).on("click", function(ev, d) { props.onNodeClick(d); });

    sim.on("tick", function() {
      link.attr("x1", function(d) { return d.source.x; }).attr("y1", function(d) { return d.source.y; })
          .attr("x2", function(d) { return d.target.x; }).attr("y2", function(d) { return d.target.y; });
      node.attr("transform", function(d) { return "translate(" + d.x + "," + d.y + ")"; });
    });

    return function() { sim.stop(); };
  }, []);

  return h("div", { style: { width: "100%", height: "100%", position: "relative" } },
    h("svg", { ref: svgRef, style: { width: "100%", height: "100%", background: "#fff" } })
  );
}

// ── REPORT COMPONENTS ──
function MetricCard(props) {
  return h("div", { style: {

    props.subtext ? h("div", { style: { fontSize: 12, color: P.textMuted, marginTop: 6 } }, props.subtext) : null

}

function Table(props) {
  return h("div", { style: { overflowX: "auto", margin: "8px 0", borderRadius: 8, border: "1px solid " + P.border } },
    h("table", { style: { width: "100%", borderCollapse: "collapse", fontSize: 13 } },
      h("thead", null,
        h("tr", { style: { background: P.bgSoft } },
          props.headers.map(function(hd, i) {
            return h("th", { key: i, style: { padding: "10px 14px", textAlign: i === 0 ? "left" : "right", color: P.textMuted, fontWeight: 500, borderBottom: "1px solid " + P.border, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.06em" } }, hd);
          })
        )
      ),
      h("tbody", null,
        props.rows.map(function(row, ri) {
          return h("tr", { key: ri },
            row.map(function(cell, ci) {
              var isObj = typeof cell === "object" && cell !== null;
              return h("td", { key: ci, style: { padding: "10px 14px", textAlign: ci === 0 ? "left" : "right", color: isObj ? (cell.color || P.textBody) : P.textBody, borderBottom: "1px solid " + P.borderLight, fontWeight: isObj && cell.bold ? 600 : 400, fontFamily: ci > 0 ? "'SF Mono', Menlo, monospace" : "inherit", fontSize: ci > 0 ? 12 : 13 } }, isObj ? cell.value : cell);
            })
          );
        })
      )
    )
  );
}

function Bar(props) {
  var pct = (props.value / props.max) * 100;
  var over = pct > 100;
  return h("div", { style: { marginBottom: 14 } },
    h("div", { style: { display: "flex", justifyContent: "space-between", marginBottom: 5 } },
      h("span", { style: { fontSize: 13, color: P.textBody } }, props.label),
      h("span", { style: { fontSize: 11, color: over ? P.red : P.textMuted, fontFamily: "'SF Mono', monospace" } }, Math.round(pct) + "%")
    ),
    h("div", { style: { height: 4, background: "#f0f0f0", borderRadius: 2, overflow: "hidden" } },
      h("div", { style: { height: "100%", width: Math.min(pct, 100) + "%", background: over ? P.red : (props.color || "#888"), borderRadius: 2, transition: "width 0.8s ease" } })
    )
  );
}

function Callout(props) {
  return h("div", { style: { padding: "16px 18px", background: props.bg || P.bgSoft, border: "1px solid " + (props.borderColor || P.border), borderRadius: 8, margin: "8px 0", borderLeft: "3px solid " + (props.accent || "#ccc") } },
    h("div", { style: { fontWeight: 600, fontSize: 13, color: props.titleColor || P.text, marginBottom: 4 } }, props.title),
    h("p", { style: { fontSize: 13, lineHeight: 1.7, color: P.textBody, margin: 0 } }, props.children)

}

// ── APP ──
function App() {

      h("button", { onClick: function() { setSb(!showSb); }, style: { background: "none", border: "none", color: "#bbb", cursor: "pointer", fontSize: 14, padding: "2px 4px" } }, showSb ? "\u25c0" : "\u25b6"),

        ),

      h("div", { style: { display: "flex", gap: 1, background: "#f5f5f5", borderRadius: 6, padding: 2 } },
        [{ id: "graph", label: "Graph" }, { id: "report", label: "Report" }].map(function(tab) {
          var active = view === tab.id;
          return h("button", {
            key: tab.id,

            style: { padding: "4px 14px", border: "none", borderRadius: 4, cursor: "pointer", background: active ? "#fff" : "transparent", color: active ? P.text : P.textMuted, fontSize: 12, fontWeight: active ? 500 : 400, fontFamily: "'Inter', sans-serif", boxShadow: active ? "0 1px 3px rgba(0,0,0,0.06)" : "none" }

}

---
# =====================================================================
# CORTEX v2 CANONICAL SCHEMA
# =====================================================================
# Single source of truth for all 17 JCR tabs. Both builders (build_XXXX.py)
# and the Supabase loader MUST read from this file.
#
# Versioning: bump schema_version when columns change. Loader refuses
# files whose Overview.A1 schema_version doesn't match or is older than
# `min_loader_version`.
# =====================================================================
schema_version: "CORTEX_V2.1"
min_loader_version: "CORTEX_V2.1"
generated: "2026-04-14"
canonical_source: "OWP 2023-2026 cohort (build_20XX.py v2 builders)"

# Applies to every tab
global:
  header_row_default: 5          # Row where column headers live
  title_rows: [1, 2]             # Title + subtitle (merged)
  data_start_row: 6              # First data row
  currency_nf: '"$"#,##0.00;[Red]-"$"#,##0.00'
  percent_nf: "0.0%"
  date_iso: "YYYY-MM-DD"

# ---------------------------------------------------------------------
# TABS — declared in canonical order. Every XLSX must have exactly these
# 17 tabs in this order.
# ---------------------------------------------------------------------
tabs:

  - name: Overview
    kind: kv_sheet                # label/value layout, not columnar
    header_row: 5                 # "PROJECT OVERVIEW" band
    key_column: B
    value_column: C
    source_column: F
    required_labels:              # canonical data_label -> description
      - label: project_job_number      # e.g. "2026"
        required: true
      - label: project_name_sage
        required: true
      - label: project_description
      - label: general_contractor
      - label: customer_code_sage
      - label: jobsite_location
      - label: unit_count
      - label: contract_type            # "Lump Sum" | "T&M" | "Cost+"
      - label: contract_document
      - label: work_period              # ISO date range "YYYY-MM-DD..YYYY-MM-DD"
      - label: pm                       # Project Manager (often blank; compute if present)
    label_aliases:
      project_job_number: ["Project Job #", "Job #", "Job Number"]
      project_name_sage:  ["Project Name (Sage)", "Project Name", "Sage Name"]
      project_description: ["Project Description", "Description"]
      general_contractor: ["General Contractor", "GC", "Customer"]
      customer_code_sage: ["Customer Code (Sage)", "Customer Code", "Cust Code"]
      jobsite_location: ["Jobsite Location", "Location", "Address"]
      unit_count: ["Unit Count", "Units", "# Units"]
      contract_type: ["Contract Type"]
      contract_document: ["Contract / PO Document", "Contract", "Contract Document"]
      work_period: ["Work Period", "Schedule", "Duration"]
      pm: ["PM", "Project Manager"]

  - name: Budget vs Actual
    kind: table
    header_row: 5
    columns:
      - name: cost_code            # key
        aliases: [Code, Cost Code]
        dtype: string
        required: true
      - name: description
        aliases: [Description]
        dtype: string
        required: true
      - name: original_budget
        aliases: [Orig Budget, Original Budget, "Orig $"]
        dtype: currency
        required: true
      - name: revised_budget
        aliases: [Rev Budget, Revised Budget]
        dtype: currency
        required: true
      - name: actual
        aliases: [Actual, "Actual $"]
        dtype: currency
        required: true
      - name: variance
        aliases: [Variance, "Var", "Var $"]
        dtype: currency
      - name: pct_used
        aliases: ["% Used", "% of Revised", "Pct Used"]
        dtype: percent
      - name: hours
        aliases: [Hours, Hrs]
        dtype: number
      - name: source
        aliases: [Source, Src]
        dtype: string
    totals_row: true

  - name: Cost Breakdown
    kind: table
    header_row: 5
    columns:
      - name: category          # Labor | Material | Subcontractor | Burden | Tax
        aliases: [Category]
        dtype: string
        required: true
        enum: [Labor, Material, Subcontractor + Engineering + Permits + Other, Payroll Burden, Payroll Taxes, Overhead, Burden]
      - name: cost_codes
        aliases: [Cost Codes, "# Codes"]
        dtype: string
      - name: actual
        aliases: ["Actual $", Actual, Budget]
        dtype: currency
        required: true
      - name: pct_of_direct_cost
        aliases: ["% of Direct Cost", "% of Cost", "% Budget"]
        dtype: percent
      - name: pct_of_revenue
        aliases: ["% of Revenue", "% Revenue"]
        dtype: percent
      - name: per_unit
        aliases: [Per Unit, "$/Unit"]
        dtype: currency
      - name: source
        aliases: [Source]
        dtype: string
    totals_row: true

  - name: Material
    kind: table
    header_row: 5
    columns:
      - name: vendor_id
        aliases: [Vendor ID, "Vendor #", Code]
        dtype: string
        required: true
      - name: vendor_name
        aliases: [Vendor Name, Description, Vendor]
        dtype: string
        required: true
        sanitize:
          - strip_location_suffix   # strip '\s*\$[A-Z][A-Za-z0-9\s&]+$'
      - name: total_spend
        aliases: [Total Spend, Actual, "Rev Budget"]
        dtype: currency
        required: true
      - name: transactions
        aliases: ["# Transactions", "# Invoices", "Txn Count"]
        dtype: number
      - name: category
        aliases: [Category, "Category (inferred)", "% of Mat"]
        dtype: string
      - name: source
        aliases: [Source]
        dtype: string

  - name: Crew & Labor
    kind: table
    header_row: 5
    columns:
      - name: worker_id
        aliases: [Worker ID, Worker, "Worker #"]
        dtype: string
        required: true
      - name: worker_name
        aliases: [Worker Name, Name]
        dtype: string
      - name: total_hours
        aliases: [Total Hours, Hours, Hrs]
        dtype: number
        required: true
      - name: gross_pay
        aliases: [Gross Pay, "Gross $", Pay]
        dtype: currency
        required: true
      - name: blended_wage_per_hr
        aliases: [Blended Wage ($/hr), "$/Hour", "$/hr"]
        dtype: currency
      - name: tier
        aliases: [Tier, Level]
        dtype: string
        enum: [Foreman, Journeyman, Apprentice, Laborer, Senior, Other]
        sanitize:
          - normalize_tier          # {Sr., Sr, Senior} -> Senior
      - name: work_days
        aliases: ["# Work Days", "Days", "Work Days"]
        dtype: number
      - name: source
        aliases: [Source]
        dtype: string

  - name: Crew Analytics
    kind: table
    header_row: 5
    columns:
      - name: tier
        aliases: [Tier]
        dtype: string
        required: true
      - name: worker_count
        aliases: ["# Workers", "Workers"]
        dtype: number
      - name: hours
        aliases: [Hours]
        dtype: number
      - name: gross_pay
        aliases: [Gross Pay]
        dtype: currency
      - name: pct_of_hours
        aliases: ["% of Hours"]
        dtype: percent
      - name: blended_wage
        aliases: ["Blended Gross Wage ($/hr)", "Labor$ / Hrs (pre-burden)"]
        dtype: currency

  - name: Productivity
    kind: table
    header_row: 5
    columns:
      - name: phase
        aliases: [Phase]
        dtype: string
        required: true
      - name: labor_code
        aliases: [Labor Code, Code]
        dtype: string
      - name: hours
        aliases: [Hours]
        dtype: number
      - name: pct_of_total
        aliases: ["% of Total"]
        dtype: percent
      - name: hours_per_unit
        aliases: ["Hours / Unit", "Hrs/Unit"]
        dtype: number

  - name: PO Commitments
    kind: table
    header_row: 5
    columns:
      - name: po_number
        aliases: ["PO #", PO, "OWP Code"]
        dtype: string
        required: true
      - name: date
        aliases: [Date]
        dtype: date_iso
      - name: issuer
        aliases: [Issuer, Vendor, GC]
        dtype: string
      - name: type
        aliases: [Type]
        dtype: string
      - name: status
        aliases: [Status]
        dtype: string
      - name: description
        aliases: [Description, "Description → JDR"]
        dtype: string
      - name: amount
        aliases: [Amount, "JDR Material"]
        dtype: currency
      - name: source
        aliases: [Source]
        dtype: string

  - name: Billing & SOV
    kind: table
    header_row: 5
    columns:
      - name: pay_app_number
        aliases: ["App #", "Invoice #", "Pay App"]
        dtype: string
        required: true
      - name: date
        aliases: [Date]
        dtype: date_iso
        required: true
      - name: contract_total
        aliases: [Contract Total, "Total Billed (signed)"]
        dtype: currency
      - name: this_period
        aliases: [This Period, Billed, "This Period $"]
        dtype: currency
      - name: retainage
        aliases: [Retainage, "Retainage (signed)"]
        dtype: currency
      - name: stored_materials
        aliases: [Stored, Stored Materials]
        dtype: currency
      - name: cumulative
        aliases: [Cumulative, "Cumulative $"]
        dtype: currency
      - name: pct_complete
        aliases: ["% Complete", "# Lines"]
        dtype: percent
      - name: source
        aliases: [Source]
        dtype: string

  - name: Insights
    kind: table                # v2 uses tabular rows; older was kv_sheet
    header_row: 10
    columns:
      - name: insight_id
        aliases: ["#", "ID"]
        dtype: number
      - name: title
        aliases: [Title, Insight, Headline]
        dtype: string
        required: true
      - name: finding
        aliases: [Finding, Detail, Description]
        dtype: string
        required: true
      - name: verified
        aliases: [Verified, Status]
        dtype: string
      - name: source
        aliases: [Source]
        dtype: string

  - name: Benchmark KPIs
    kind: kv_sheet
    header_row: 10
    key_column: B             # "Profile" band label column
    value_column: C
    source_column: F
    required_labels:
      - label: project_type
      - label: owner
      - label: parent_owner
      - label: location
      - label: revenue_total          # MUST exist — compute if missing
        required: true
        fallback: "sum(Billing & SOV.this_period)"
      - label: contract_original
        required: true
        fallback: "first(Billing & SOV.contract_total)"
      - label: contract_final
        required: true
        fallback: "last(Billing & SOV.contract_total)"
      - label: direct_cost_total
        required: true
        fallback: "sum(Cost Breakdown.actual)"
      - label: net_profit
        required: true
        fallback: "revenue_total - direct_cost_total"
      - label: gross_margin_pct
        required: true
        fallback: "net_profit / revenue_total"
      - label: labor_hours_total
        required: true
        fallback: "sum(Crew & Labor.total_hours)"
      - label: workers_count
        required: true
        fallback: "count(Crew & Labor.worker_id)"
      - label: vendors_count
        fallback: "count(Material.vendor_id)"
      - label: pos_count
        fallback: "count(PO Commitments.po_number)"
      - label: units
        fallback: "Overview.unit_count"
      - label: duration_months
      - label: cost_codes_count
        fallback: "count(Budget vs Actual.cost_code)"
      - label: retainage_outstanding

  - name: Change Log
    kind: table
    header_row: 5
    columns:
      - name: event_id
        aliases: [Event ID, "ID", "#"]
        dtype: string
        required: true
      - name: type
        aliases: [Type]
        dtype: string
        enum: [ASI, RFI, COR, Change Order, PR, Submittal, Budget Transfer, Other]
      - name: date
        aliases: [Date]
        dtype: date_iso
        required: true
        sanitize:
          - extract_iso_date        # re.search(r'\d{4}-\d{2}-\d{2}') -> date; keep raw in date_range
      - name: subject
        aliases: [Subject]
        dtype: string
        required: true
      - name: originator
        aliases: [Originator, Source Party]
        dtype: string
      - name: linked_events
        aliases: ["Linked Event(s)", "Linked", "Links"]
        dtype: list
        sanitize:
          - split_linked             # re.split(r'[,/\n]+')
      - name: cost_impact
        aliases: ["Cost Impact ($)", "Cost Impact", "$ Impact"]
        dtype: currency
      - name: schedule_days
        aliases: ["Schedule (days)", "Days", "Sched Days"]
        dtype: number
      - name: status
        aliases: [Status]
        dtype: string
        enum: [Open, Closed, Executed, Void, Pending, Not Found]
      - name: source_document
        aliases: [Source Document, Source, Document]
        dtype: string

  - name: Root Cause Analysis
    kind: table
    header_row: 5
    columns:
      - name: rca_id
        aliases: ["#", ID, "RCA #"]
        dtype: string
      - name: observation
        aliases: [Observation, Finding]
        dtype: string
        required: true
      - name: root_cause
        aliases: [Root Cause, Cause]
        dtype: string
        required: true
      - name: responsibility
        aliases: [Responsibility, Owner, Party]
        dtype: string
        enum: [OWP, GC, Architect, Owner, Vendor, Joint, Unknown]
      - name: cost_impact
        aliases: [Cost Impact, "Cost ($)"]
        dtype: currency
      - name: mitigation
        aliases: [Mitigation, Action]
        dtype: string
      - name: source
        aliases: [Source]
        dtype: string

  - name: Predictive Signals
    kind: table
    header_row: 5
    columns:
      - name: signal_id
        aliases: ["#", ID]
        dtype: string
      - name: signal_name
        aliases: [Signal, Name, Title]
        dtype: string
        required: true
      - name: direction
        aliases: [Direction, Trend]
        dtype: string
        enum: [Leading Positive, Leading Negative, Lagging, Neutral]
      - name: metric
        aliases: [Metric, KPI]
        dtype: string
      - name: threshold
        aliases: [Threshold, Trigger]
        dtype: string
      - name: historical_outcome
        aliases: [Historical Outcome, Outcome]
        dtype: string
      - name: source
        aliases: [Source]
        dtype: string

  - name: Metric Registry
    kind: table
    header_row: 5
    columns:
      - name: metric_key
        aliases: [Key, "metric_key"]
        dtype: string
        required: true
      - name: metric_label
        aliases: [Label, "Metric"]
        dtype: string
        required: true
      - name: value
        aliases: [Value, Raw]
        dtype: any
      - name: data_label
        aliases: [data_label, "Canonical Label"]
        dtype: string
        required: true
      - name: tab_home
        aliases: [Tab, Home, "Tab Home"]
        dtype: string
      - name: verification
        aliases: [Verified, Verification]
        dtype: string
        enum: [Verified, Derived, Inferred, Low, Missing]
      - name: source
        aliases: [Source]
        dtype: string

  - name: Reconciliation
    kind: table
    header_row: 5
    columns:
      - name: check_number
        aliases: ["#", "Check #"]
        dtype: number
        required: true
      - name: check_description
        aliases: [Check, Description]
        dtype: string
        required: true
      - name: value_a
        aliases: [A, "Value A", Expected]
        dtype: any
      - name: value_b
        aliases: [B, "Value B", Actual]
        dtype: any
      - name: difference
        aliases: [Diff, Difference, Delta]
        dtype: any
      - name: status
        aliases: [Status]
        dtype: string
        enum: [TIES, WITHIN, NEAR, OFF, FAIL]
        required: true
      - name: tabs
        aliases: [Tabs, Cross-ref, References]
        dtype: string
    load_gate: true                # If any row.status == OFF or FAIL, abort load for this project

  - name: Vendors
    kind: table
    header_row: 5
    columns:
      - name: vendor_id
        aliases: [Vendor ID, Code]
        dtype: string
        required: true
      - name: vendor_name
        aliases: [Vendor Name, Name, Vendor]
        dtype: string
        required: true
        sanitize:
          - strip_location_suffix
      - name: total_spend
        aliases: [Total Spend, Actual, Spend]
        dtype: currency
      - name: transactions
        aliases: ["# Transactions", "# Invoices"]
        dtype: number
      - name: category
        aliases: [Category, "Category (inferred)"]
        dtype: string
      - name: source
        aliases: [Source]
        dtype: string

# ---------------------------------------------------------------------
# SANITIZERS — python regex/logic the normalizer applies per-column
# ---------------------------------------------------------------------
sanitizers:
  strip_location_suffix:
    kind: regex_sub
    pattern: '\s*\$[A-Z][A-Za-z0-9\s&]+$'
    repl: ''
    note: "Strip '$Boren', '$525 Boren', '$Atlas' etc from vendor names"
  normalize_tier:
    kind: map
    mapping:
      "Sr.": Senior
      "Sr": Senior
      "Senior": Senior
      "Foreman": Foreman
      "Fm": Foreman
      "Journeyman": Journeyman
      "JM": Journeyman
      "Apprentice": Apprentice
      "Apt": Apprentice
      "Laborer": Laborer
  extract_iso_date:
    kind: regex_extract
    pattern: '\d{4}-\d{2}-\d{2}'
    on_miss: null             # null out event_date, preserve raw in date_range
  split_linked:
    kind: regex_split
    pattern: '[,/\n]+'
    strip: true
    drop_empty: true

# ---------------------------------------------------------------------
# COHORT OVERRIDES — legacy file patches until all are normalized
# ---------------------------------------------------------------------
cohorts:
  legacy_v1:
    files: [2001, 2008, 2009, 2010, 2011, 2012, 2015, 2017, 2018, 2019, 2020, 2021, 2022]
    header_row_offsets:       # old files use row 4 for some tabs
      Budget vs Actual: 4
      Crew & Labor: 4
      Material: 6
      PO Commitments: 6
    known_gaps:
      - "Missing: hours column in Budget vs Actual"
      - "Missing: source column in most tabs"
      - "Missing: revenue_total, contract_final in Benchmark KPIs — compute via fallback"
      - "Change Log uses variable header row (5-10) — detect, don't assume"
      - "Insights tab is kv_sheet in legacy, table in v2 — normalizer must reshape"
  current_v2:
    files: [2023, 2024, 2025, 2026]
    header_row_offsets: {}     # matches global default
